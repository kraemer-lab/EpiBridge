name: epibridge

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-epibridge}
      POSTGRES_USER: ${POSTGRES_USER:-epibridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-epibridge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # Ollama serves models to the platform over the internal network,
  # but also requires external network access to download models from
  # the Ollama registry. No other platform service requires Internet access.
  ollama:
    profiles:
      - ai
    image: ollama/ollama:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    volumes:
      - ollamadata:/root/.ollama
    networks:
      - internal
      - external

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import http.client; c=http.client.HTTPConnection('localhost',8000,timeout=5); c.request('GET','/api/health'); assert c.getresponse().status==200"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    env_file:
      - .env
    environment:
      RESOURCE_MANIFEST_DIR: /examples/resources
      ENVIRONMENT_MANIFEST_DIR: /execution-environments
      # Persistent output store shared between backend and worker.
      # Execution containers write to their own local /output directory.
      # The worker imports those outputs here after execution; the backend
      # serves them from here via the download endpoint.
      OUTPUT_DIR: /outputs
      BUNDLE_STORE_DIR: /var/lib/epibridge/bundles
    volumes:
      - /var/lib/epibridge/outputs:/outputs:ro
      - /var/lib/epibridge/bundles:/var/lib/epibridge/bundles:rw
      - /var/lib/epibridge/releases:/var/lib/epibridge/releases
      - /var/log/epibridge:/var/log/epibridge
      - ./examples/resources:/read-only-data:ro
      # Development manifest directories for lifespan auto-registration.
      # Production deployments should configure RESOURCE_MANIFEST_DIR
      # and ENVIRONMENT_MANIFEST_DIR env vars directly instead.
      - ./execution-environments:/execution-environments:ro
      - ./examples/resources:/examples/resources:ro
    networks:
      - internal
      - frontend

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'worker.main' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    env_file:
      - .env
    environment:
      # The worker runs in a container, so provider mount sources
      # like /read-only-data/* are not visible to Docker Engine
      # on the host. HOST_DATA_ROOT provides the host-side equivalent.
      HOST_DATA_ROOT: ${HOST_DATA_ROOT:-/opt/epibridge/examples/resources}
      # Persistent output store — writes imported execution artefacts
      # to the same volume the backend reads from.
      OUTPUT_DIR: /outputs
      ANALYSIS_BUNDLE_ROOT: /var/lib/epibridge/bundles
    volumes:
      # Docker socket enables DockerExecutor — the only component
      # that communicates with Docker Engine to orchestrate analysis containers.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/epibridge/outputs:/outputs
      - /var/lib/epibridge/bundles:/var/lib/epibridge/bundles:ro
      - /var/log/epibridge:/var/log/epibridge
      - ./examples/resources:/read-only-data:ro
    networks:
      - internal
    group_add:
      - "${DOCKER_GID:?DOCKER_GID must be set — run bootstrap.sh or export DOCKER_GID=$(getent group docker | cut -d: -f3)}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    networks:
      - frontend

  reverse-proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./vm/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - frontend
      - backend
    networks:
      - frontend

volumes:
  pgdata:
  redisdata:
  ollamadata:
  caddydata:
  caddyconfig:

networks:
  internal:
    internal: true
  frontend:
  # Provides outbound Internet access for administrative tasks such as
  # pulling AI models. Only the Ollama service connects to this network.
  external:
