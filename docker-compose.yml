services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-epibridge}
      POSTGRES_USER: ${POSTGRES_USER:-epibridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-epibridge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - /var/lib/epibridge/outputs:/outputs:ro
      - /var/log/epibridge:/var/log/epibridge
    networks:
      - internal
      - frontend

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      # Docker socket enables DockerExecutor — the only component
      # that communicates with Docker Engine to orchestrate analysis containers.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/epibridge/outputs:/outputs
      - /var/log/epibridge:/var/log/epibridge
    networks:
      - internal
    group_add:
      - "993"  # docker group GID

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    networks:
      - frontend

  reverse-proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./vm/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - frontend
      - backend
    networks:
      - frontend

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:

networks:
  internal:
    internal: true
  frontend:
