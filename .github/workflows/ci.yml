name: CI

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install backend dependencies
      run: |
        cd backend
        pip install -e ".[dev]"

    - name: Format check
      run: |
        cd backend
        python -m ruff format --check

    - name: Lint
      run: |
        cd backend
        python -m ruff check

    - name: Run unit tests
      run: |
        cd backend
        python -m pytest tests/unit -v --cov=app --cov-report=term-missing

    - name: Bootstrap EpiBridge
      run: make ci

    - name: Run golden path e2e test
      run: |
        cd frontend
        npm ci
        npx playwright install --with-deps chromium
        npx playwright test

    - name: Collect logs on failure
      if: failure()
      run: docker compose logs --tail=50

    - name: Tear down
      if: always()
      run: make ci-clean
