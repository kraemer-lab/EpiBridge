# EpiBridge Execution Environment Manifest
#
# Execution Environments are institutional assets representing approved
# base runtimes from which execution images are built.
#
# Required fields per entry:
#   identifier, name, runtime

environments:
  - identifier: python-3.13
    name: Python 3.13
    runtime: python-3.13
    description: "Python 3.13 (slim) with NumPy and Pandas"
    status: active
    # Institution-specified runtime image. During development, build locally
    # from the Dockerfile in this directory. In production, build and publish
    # to a registry chosen by the institution.
    image_reference: "epibridge/python-3.13:latest"

  - identifier: python-3.14
    name: Python 3.14
    runtime: python-3.14
    description: "Python 3.14 (slim) with NumPy and Pandas"
    status: active
    # Institution-specified runtime image. During development, build locally
    # from the Dockerfile in this directory. In production, build and publish
    # to a registry chosen by the institution.
    image_reference: "epibridge/python-3.14:latest"

  - identifier: conda
    name: Conda (Micromamba 2.x)
    runtime: conda
    description: "Conda environment builder via Micromamba 2.8.1 — language and packages defined by researcher's environment.yml"
    status: active
    # Institution-specified runtime image. During development, build locally
    # from the Dockerfile in this directory. In production, build and publish
    # to a registry chosen by the institution.
    image_reference: "epibridge/conda:latest"
