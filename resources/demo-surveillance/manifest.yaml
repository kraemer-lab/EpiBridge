# EpiBridge Published Data Resource
#
# The institutional publication manifest for this Data Resource.
# The publication directory is derived from the identifier (resources/<identifier>/).

identifier: demo-surveillance
name: Demonstration Surveillance Dataset
alias: demo-surveillance
provider: csv
endpoint:
  path: demo-surveillance/data
description: >
  A 50-record synthetic surveillance dataset for platform demonstration
  and analysis development. Contains patient demographics (age, region),
  exposure history, vaccination status, and clinical outcomes. Designed
  for summary statistics, stratification, and basic epidemiological
  exploration. Mounted at /data/demo-surveillance/ in execution containers.
version: "1.0.0"
status: active
