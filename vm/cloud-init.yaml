#cloud-config
---
package_update: true
package_upgrade: true

packages:
  - git
  - curl
  - ca-certificates
  - gnupg
  - lsb-release
  - ufw
  - unattended-upgrades

users:
  - name: epibridge
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    groups: docker
    lock_passwd: true
    ssh_authorized_keys: []

runcmd:
  # Set up Docker repository
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null

  # Install Docker Engine and Docker Compose
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  # Enable and start Docker
  - systemctl enable docker
  - systemctl start docker

  # Enable unattended security upgrades
  - dpkg-reconfigure --priority=low unattended-upgrades -f noninteractive

  # Configure UFW
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow ssh
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # Create directories
  - mkdir -p /opt/epibridge
  - mkdir -p /var/lib/epibridge/data
  - mkdir -p /var/lib/epibridge/bundles
  - mkdir -p /var/lib/epibridge/outputs
  - mkdir -p /var/lib/epibridge/releases
  - mkdir -p /var/log/epibridge

  # Set ownership
  - chown -R epibridge:epibridge /opt/epibridge
  - chown -R epibridge:epibridge /var/lib/epibridge
  - chown -R epibridge:epibridge /var/log/epibridge

  # Add epibridge to docker group
  - usermod -aG docker epibridge

  # Final status
  - echo "EpiBridge runtime ready — run install.sh as epibridge user"
